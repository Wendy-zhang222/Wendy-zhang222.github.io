<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Move to Folder - Educational Game Platform</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#308ce8",
                        "background-light": "#f6f7f8",
                        "background-dark": "#111921",
                    },
                    fontFamily: {
                        "display": ["Lexend", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Lexend', sans-serif;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #e2e8f0;
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #cbd5e1;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen">
<!-- Mock Background: My Games Dashboard -->
<div class="fixed inset-0 z-0 overflow-hidden opacity-40 pointer-events-none select-none">
<div class="max-w-6xl mx-auto p-8">
<header class="flex items-center justify-between mb-10">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary text-4xl">school</span>
<h1 class="text-2xl font-bold">Educational Game Platform</h1>
</div>
<div class="flex gap-4">
<div class="w-10 h-10 rounded-full bg-slate-200"></div>
</div>
</header>
<div class="flex justify-between items-end mb-8">
<div>
<h2 class="text-4xl font-black tracking-tight">My Games</h2>
<p class="text-slate-500 mt-1">Organize and manage your educational activities</p>
</div>
<button class="bg-primary text-white px-6 py-2.5 rounded-lg font-bold">+ Create New Game</button>
</div>
<div class="grid grid-cols-3 gap-6">
<div class="h-64 bg-white rounded-xl shadow-sm border border-slate-200"></div>
<div class="h-64 bg-white rounded-xl shadow-sm border border-slate-200"></div>
<div class="h-64 bg-white rounded-xl shadow-sm border border-slate-200"></div>
</div>
</div>
</div>
<!-- Modal Overlay Backdrop -->
<div class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-10 flex items-center justify-center p-4">
<!-- Modal Container -->
<div class="bg-white dark:bg-slate-900 w-full max-w-[520px] rounded-xl shadow-2xl flex flex-col overflow-hidden animate-in fade-in zoom-in duration-200">
<!-- Modal Header -->
<div class="flex items-center justify-between px-6 py-4 border-b border-slate-100 dark:border-slate-800">
<h3 class="text-xl font-bold text-slate-900 dark:text-white">Move to Folder</h3>
<button class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition-colors">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<!-- Modal Content -->
<div class="p-6 flex flex-col gap-5">
<!-- Create New Folder Action -->
<button class="flex items-center justify-center gap-2 w-full py-3 px-4 border-2 border-dashed border-primary/30 text-primary hover:bg-primary/5 rounded-lg font-semibold transition-all group">
<span class="material-symbols-outlined transition-transform group-active:scale-90">add_circle</span>
                    Create New Folder
                </button>
<!-- Folder List Section -->
<div class="flex flex-col gap-2">
<p class="text-xs font-bold uppercase tracking-wider text-slate-400 mb-1">Select a destination</p>
<div class="max-h-[320px] overflow-y-auto custom-scrollbar flex flex-col gap-2 pr-1">
<!-- Folder Item 1 -->
<label class="group relative flex items-center gap-4 p-3 rounded-lg border border-slate-100 dark:border-slate-800 hover:border-primary/50 hover:bg-primary/5 transition-all cursor-pointer">
<input checked="" class="absolute right-4 w-5 h-5 text-primary border-slate-300 focus:ring-primary focus:ring-offset-0" name="folder-selection" type="radio"/>
<div class="flex items-center justify-center w-12 h-12 rounded-lg bg-primary/10 text-primary group-hover:bg-primary group-hover:text-white transition-colors">
<span class="material-symbols-outlined">folder</span>
</div>
<div class="flex flex-col">
<span class="font-semibold text-slate-800 dark:text-slate-100">Class 4A</span>
<span class="text-sm text-slate-500 dark:text-slate-400 font-normal">12 items</span>
</div>
</label>
<!-- Folder Item 2 -->
<label class="group relative flex items-center gap-4 p-3 rounded-lg border border-slate-100 dark:border-slate-800 hover:border-primary/50 hover:bg-primary/5 transition-all cursor-pointer">
<input class="absolute right-4 w-5 h-5 text-primary border-slate-300 focus:ring-primary focus:ring-offset-0" name="folder-selection" type="radio"/>
<div class="flex items-center justify-center w-12 h-12 rounded-lg bg-primary/10 text-primary group-hover:bg-primary group-hover:text-white transition-colors">
<span class="material-symbols-outlined">dictionary</span>
</div>
<div class="flex flex-col">
<span class="font-semibold text-slate-800 dark:text-slate-100">Vocabulary</span>
<span class="text-sm text-slate-500 dark:text-slate-400 font-normal">8 items</span>
</div>
</label>
<!-- Folder Item 3 -->
<label class="group relative flex items-center gap-4 p-3 rounded-lg border border-slate-100 dark:border-slate-800 hover:border-primary/50 hover:bg-primary/5 transition-all cursor-pointer">
<input class="absolute right-4 w-5 h-5 text-primary border-slate-300 focus:ring-primary focus:ring-offset-0" name="folder-selection" type="radio"/>
<div class="flex items-center justify-center w-12 h-12 rounded-lg bg-primary/10 text-primary group-hover:bg-primary group-hover:text-white transition-colors">
<span class="material-symbols-outlined">menu_book</span>
</div>
<div class="flex flex-col">
<span class="font-semibold text-slate-800 dark:text-slate-100">Grammar Drills</span>
<span class="text-sm text-slate-500 dark:text-slate-400 font-normal">5 items</span>
</div>
</label>
<!-- Folder Item 4 -->
<label class="group relative flex items-center gap-4 p-3 rounded-lg border border-slate-100 dark:border-slate-800 hover:border-primary/50 hover:bg-primary/5 transition-all cursor-pointer">
<input class="absolute right-4 w-5 h-5 text-primary border-slate-300 focus:ring-primary focus:ring-offset-0" name="folder-selection" type="radio"/>
<div class="flex items-center justify-center w-12 h-12 rounded-lg bg-primary/10 text-primary group-hover:bg-primary group-hover:text-white transition-colors">
<span class="material-symbols-outlined">science</span>
</div>
<div class="flex flex-col">
<span class="font-semibold text-slate-800 dark:text-slate-100">Science Quiz</span>
<span class="text-sm text-slate-500 dark:text-slate-400 font-normal">0 items</span>
</div>
</label>
<!-- Folder Item 5 -->
<label class="group relative flex items-center gap-4 p-3 rounded-lg border border-slate-100 dark:border-slate-800 hover:border-primary/50 hover:bg-primary/5 transition-all cursor-pointer">
<input class="absolute right-4 w-5 h-5 text-primary border-slate-300 focus:ring-primary focus:ring-offset-0" name="folder-selection" type="radio"/>
<div class="flex items-center justify-center w-12 h-12 rounded-lg bg-primary/10 text-primary group-hover:bg-primary group-hover:text-white transition-colors">
<span class="material-symbols-outlined">psychology</span>
</div>
<div class="flex flex-col">
<span class="font-semibold text-slate-800 dark:text-slate-100">Mental Math</span>
<span class="text-sm text-slate-500 dark:text-slate-400 font-normal">3 items</span>
</div>
</label>
</div>
</div>
</div>
<!-- Modal Footer -->
<div class="flex items-center justify-end gap-6 px-6 py-5 bg-slate-50 dark:bg-slate-800/50 border-t border-slate-100 dark:border-slate-800">
<button class="text-slate-500 hover:text-slate-700 dark:text-slate-400 dark:hover:text-slate-200 font-medium text-sm transition-colors">
                    Cancel
                </button>
<button class="bg-primary text-white px-8 py-3 rounded-lg font-bold shadow-lg shadow-primary/20 hover:bg-primary/90 active:transform active:scale-95 transition-all">
                    Move Here
                </button>
</div>
</div>
</div>
</body></html>
